<html lang="en">
  <head>
    <title>&lt;gear&gt; </title>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.js"></script>
    <style>
        model-viewer{
                width: 100vw;
                height: 100vh;
                margin: 0 auto;
                background-color: rgb(32, 134, 165);
                --poster-color: rgb(238, 238, 238);
              /*  background-image:   url("https://amymhaddad.s3.amazonaws.com/morocco-blue.png"),
                                    url("https://amymhaddad.s3.amazonaws.com/oriental-tiles.png");
              */
        }
    
    </style>
</head> 
<body>
    <style>
        button{
          display: block;
          width: 20px;
          height: 20px;
          border-radius: 10px;
          border: none;
          background-color: blue;
          box-sizing: border-box;
        }
      
        button[slot="hotspot-hand"]{
          --min-hotspot-opacity: 0;
          background-color: red;
        }
      
        button[slot="hotspot-foot"]:not([data-visible]) {
          background-color: transparent;
          border: 3px solid blue;
        }
      
        #annotation{
          background-color: #888888;
          position: absolute;
          transform: translate(10px, 10px);
          border-radius: 10px;
          padding: 10px;
        }
        /* This keeps child nodes hidden while the element loads */
        :not(:defined) > * {
          display: none;
        }
      </style>
        <div id="annotation" >helmut</div>
       <model-viewer camera-controls skybox-image="https://modelviewer.dev/shared-assets/environments/spruit_sunrise_1k_HDR.hdr" alt="A 3D model of a gear" src="./model.gltf"></model-viewer>
        <!--
        <button slot="hotspot-visor" data-position="0 1.75 0.35" data-normal="0 0 1"></button>
        <button slot="hotspot-hand" data-position="-0.54 0.93 0.1" data-normal="-0.73 0.05 0.69">
          <div id="annotation">This hotspot disappears completely</div>
        </button>
        <button slot="hotspot-foot" data-position="0.16 0.1 0.17" data-normal="-0.07 0.97 0.23" data-visibility-attribute="visible"></button>
        -->
      
        
    </model-viewer>

</body>
</html>
